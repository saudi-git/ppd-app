
services:
  app:
    build: .
    container_name: ppd-php-app
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: ppd-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_sfms
    ports:
      - "3307:3306"
    # DITO ANG DAGDAG:
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin
    container_name: ppd-phpmyadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 256M
    depends_on:
      - db

# KAILANGAN DIN ITO SA PINAKABABA:
volumes:
  db_data:


  
